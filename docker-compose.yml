services:
  vectorowl:
    image: radsilent/vectorowl:latest
    container_name: vectorowl
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - VECTOROWL_LICENSE_KEY=${VECTOROWL_LICENSE_KEY:?Required}
      - VECTOROWL_PORT=8080
      - VECTOROWL_HOST=0.0.0.0
      - VECTOROWL_REQUIRE_TORCH_GPU=false
      - VECTOROWL_STARTUP_GRAPH=demo
      - VECTOROWL_LLM_PROVIDER=${VECTOROWL_LLM_PROVIDER:-}
      - VECTOROWL_LLM_API_KEY=${VECTOROWL_LLM_API_KEY:-}
      - VECTOROWL_LLM_ENDPOINT=${VECTOROWL_LLM_ENDPOINT:-}
      - VECTOROWL_LLM_MODEL=${VECTOROWL_LLM_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}

  caddy:
    image: caddy:2-alpine
    container_name: vectorowl-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./www:/var/www/vectorowl:ro
    depends_on:
      - vectorowl

volumes:
  caddy_data:
  caddy_config:
