    <script>
      window.__VECTOROWL_ERRORS = [];
      window.addEventListener('error', function(e) {
        window.__VECTOROWL_ERRORS.push({ type: 'error', message: e.message, filename: e.filename, lineno: e.lineno, colno: e.colno, error: e.error ? (e.error.stack || e.error.message) : null });
        console.error('[FATAL] Uncaught error:', e.message, 'at', e.filename + ':' + e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__VECTOROWL_ERRORS.push({ type: 'rejection', reason: e.reason ? (e.reason.stack || String(e.reason)) : String(e.reason) });
        console.error('[FATAL] Unhandled rejection:', e.reason);
      });
    </script>

    <script>
      /* Force-clear any stale ServiceWorker so users always get the latest build. */
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
      }
    </script>
    <div id="root"></div>
    <div id="fatal-errors" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#0b0c10;color:#f87171;padding:2rem;font-family:monospace;white-space:pre-wrap;overflow:auto;">
      <h2 style="color:#66fcf1;margin:0 0 1rem;">VectorOWL Fatal Error</h2>
      <div id="fatal-errors-content"></div>
      <p style="color:#8899aa;margin-top:1rem;">Check the browser console (F12 → Console) for more details.</p>
    </div>
    <script>
      setTimeout(function() {
        var container = document.getElementById('fatal-errors');
        var content = document.getElementById('fatal-errors-content');
        if (window.__VECTOROWL_ERRORS && window.__VECTOROWL_ERRORS.length > 0) {
          container.style.display = 'block';
          content.textContent = window.__VECTOROWL_ERRORS.map(function(e) {
            return (e.type === 'rejection' ? 'Unhandled Promise Rejection:\n' : 'Error: ') + (e.message || e.reason || JSON.stringify(e));
          }).join('\n\n---\n\n');
        }
      }, 2000);
    </script>
